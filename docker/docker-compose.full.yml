# BiboBot 完整部署配置
# 包含：Qdrant 向量数据库 + BiboBot 服务 + 可选的沙箱镜像构建

version: '3.8'

services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bibobot-network

  # BiboBot 主服务
  bibobot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: bibobot
    ports:
      - "8000:8000"
    volumes:
      # 知识库目录（只读）
      - ../data/raw:/app/data/raw:ro
      # 工作目录（可读写）
      - ../data/work:/app/data/work
      # 配置文件
      - ../.env:/app/.env:ro
      # 模型缓存（避免重复下载）
      - model-cache:/root/.cache
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - USE_DOCKER_SANDBOX=true
      - DOCKER_SANDBOX_IMAGE=bibobot-sandbox:latest
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bibobot-network
    # 需要访问宿主机的 Docker（用于启动沙箱容器）
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # 沙箱镜像构建服务（一次性）
  sandbox-builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    image: bibobot-sandbox:latest
    container_name: bibobot-sandbox-builder
    # 这个服务只用于构建镜像，不保持运行
    entrypoint: ["echo", "Sandbox image built successfully"]
    deploy:
      replicas: 0
      restart_policy:
        condition: none

volumes:
  qdrant-storage:
    driver: local
  model-cache:
    driver: local

networks:
  bibobot-network:
    driver: bridge
