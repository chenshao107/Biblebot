# Biblebot - Claude CLI 适配版
# Qdrant 向量数据库 + Biblebot RAG 服务
# Agent Runtime 由 Claude CLI 提供

version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: biblebot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - biblebot-net

  biblebot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: biblebot-server
    ports:
      - "8000:8000"
    volumes:
      # 知识库目录（只读，遵循整改书安全原则）
      - ../data/canonical_md:/app/data/canonical_md:ro
      # 原始数据目录
      - ../data/raw:/app/data/raw:ro
      # 工作目录
      - ../data/work:/app/data/work
      # 配置文件
      - ../.env:/app/.env:ro
      # 模型缓存
      - model-cache:/root/.cache
    env_file:
      - ../.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - biblebot-net

volumes:
  qdrant-storage:
    driver: local
  model-cache:
    driver: local

networks:
  biblebot-net:
    driver: bridge
